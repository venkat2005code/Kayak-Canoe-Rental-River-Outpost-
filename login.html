<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp Login | Riverside</title>
    <meta name="description" content="Sign in to access your Riverside dashboard, active rentals, and past trips.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Full-screen Expedition Layout -->
    <div class="expedition-auth-page" style="background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');">
        
        <!-- Action Toggles -->
        <div class="auth-toggles">
            <button id="theme-toggle-btn" class="icon-btn auth-toggle-btn" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button id="lang-toggle" class="icon-btn auth-toggle-btn" aria-label="Toggle LTR/RTL">
                <i class="fa-solid fa-language"></i>
            </button>
        </div>
        
        <!-- Glassmorphic Panel -->
        <div class="expedition-auth-panel">

            <a href="index.html" class="expedition-auth-logo">
                <svg class="brand-icon" viewBox="0 0 40 40" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;">
        <path d="M2 25 Q 10 15, 20 25 T 38 25" />
        <path d="M6 32 Q 14 22, 20 32 T 34 32" />
        <path d="M20 5 L 12 18 H 28 Z" fill="currentColor" stroke="none" />
    </svg>
    <span style="font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: -0.5px;">Riverside</span>
            </a>
            
            <div class="expedition-auth-header">
                <h2>Basecamp Login</h2>
                <p>Welcome back! The river is calling.</p>
            </div>

            <form class="expedition-auth-form" action="user-dashboard.html" method="GET">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="explorer@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="expedition-auth-options">
                    <label>
                        <input type="checkbox" style="accent-color: var(--accent-color);"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="expedition-auth-btn">Access Dashboard</button>
            </form>

            <div class="social-login" style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 1rem;">Or continue with</p>
                <div style="display: flex; justify-content: center; gap: 1rem;">
                    <button type="button" class="btn btn-outline-dark" style="flex: 1; padding: 0.5rem; background: var(--bg-color);"><i class="fa-brands fa-google" style="color: #ea4335;"></i></button>
                    <button type="button" class="btn btn-outline-dark" style="flex: 1; padding: 0.5rem; background: var(--bg-color);"><i class="fa-brands fa-apple" style="color: var(--text-dark);"></i></button>
                    <button type="button" class="btn btn-outline-dark" style="flex: 1; padding: 0.5rem; background: var(--bg-color);"><i class="fa-brands fa-facebook-f" style="color: #1877f2;"></i></button>
                </div>
            </div>

            <div class="expedition-auth-footer">
                <p>Ready to start your journey? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </div>

    <!-- Theme initialization -->
    <script>
        const savedTheme = localStorage.getItem('dash-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <script src="script.js"></script>
</body>
</html>
